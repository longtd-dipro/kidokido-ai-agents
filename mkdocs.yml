      - Tài khoản Người dùng & Xác thực: domains/user-account-authentication.md
      - Quản lý Cơ sở & Nội dung (Admin): domains/admin-facility-management.md
      - Thanh toán & Hóa đơn: domains/payment-billing.md
      - Check-in POS & Quét vé: domains/pos-checkin-ticketing.md
  - Màn hình thực tế:
      - Admin (Super Admin): screens/admin.md
